name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'latex/**'
      - 'Scans/embedded/**'
      - 'Transkript/*'
      - 'merge_report.md'
      - 'scripts/**'
      - '.github/workflows/build-pdf.yml'
      - '.github/pages/**'
  workflow_dispatch:

# Only allow one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v5

      - name: Convert transcripts to LaTeX pages
        run: python3 latex/md2tex.py

      - name: Regenerate schulchronik.tex from pages
        run: python3 latex/generate_main.py

      - name: Commit if changed
        id: commit
        run: |
          git diff --quiet latex/ && echo "changed=false" >> "$GITHUB_OUTPUT" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latex/pages/ latex/schulchronik.tex
          git commit -m "Auto-generate LaTeX pages and schulchronik.tex [skip ci]"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

  # ── Chronik outputs (PDF for now; epub/html later) ──────────────
  build-chronik:
    needs: regenerate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Pull latest (in case regenerate committed)
        run: git pull --ff-only

      - name: Build PDF
        uses: xu-cheng/latex-action@v4
        with:
          root_file: schulchronik.tex
          working_directory: latex
          latexmk_use_lualatex: true

      - name: Upload Chronik artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chronik
          path: latex/schulchronik.pdf

  # ── Transkriptionsbericht ───────────────────────────────────────
  build-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Prepare merge report for PDF
        run: |
          mkdir -p _build
          python3 scripts/merge_report_to_pdf_md.py merge_report.md _build/transkriptionsbericht.md

      - name: Build Transkriptionsbericht PDF
        uses: docker://pandoc/extra
        with:
          args: >-
            _build/transkriptionsbericht.md
            -o transkriptionsbericht.pdf
            --template eisvogel
            --pdf-engine=lualatex

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: transkriptionsbericht.pdf

  # ── Assemble & deploy to GitHub Pages ───────────────────────────
  deploy:
    needs: [build-chronik, build-report]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Download Chronik artifacts
        uses: actions/download-artifact@v4
        with:
          name: chronik
          path: _site

      - name: Download report artifact
        uses: actions/download-artifact@v4
        with:
          name: report
          path: _site

      - name: Generate index.html
        run: |
          BUILD_DATE=$(date -u +"%d. %B %Y" | sed \
            -e 's/January/Januar/' \
            -e 's/February/Februar/' \
            -e 's/March/März/' \
            -e 's/April/April/' \
            -e 's/May/Mai/' \
            -e 's/June/Juni/' \
            -e 's/July/Juli/' \
            -e 's/August/August/' \
            -e 's/September/September/' \
            -e 's/October/Oktober/' \
            -e 's/November/November/' \
            -e 's/December/Dezember/')
          sed "s/{{BUILD_DATE}}/$BUILD_DATE/g" .github/pages/index.html > _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
